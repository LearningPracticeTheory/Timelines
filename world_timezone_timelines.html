let tempSelectedIndex = -1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "key" });
      }
    };
    req.onsuccess = e => {
      db = e.target.result;
      resolve(db);
    };
    req.onerror = e => reject(e.target.error);
  });
}

function setCache(key, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.put({ key, data, time: Date.now() });
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

function getCache(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const req = store.get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function loadCityJsonData() {
  await openDB();
  const cached = await getCache(CACHE_KEY);
  if (cached && Date.now() - cached.time < CACHE_EXPIRE) {
    try {
      cityData = cached.data;
      allCityKeys = Object.keys(cityData);
      return;
    } catch(e){}
  }
  try {
    const resp = await fetch("https://raw.githubusercontent.com/LearningPracticeTheory/Timelines/refs/heads/main/city_state_timezones.json");
    cityData = await resp.json();
    allCityKeys = Object.keys(cityData);
    await setCache(CACHE_KEY, cityData);
  } catch (e) {
    console.error("City data load failed");
  }
}

$(document).on('mouseenter', '#tipStart', () => $('#boxStart').show());
$(document).on('mouseleave', '#tipStart', () => $('#boxStart').hide());

$(document).on('mouseleave', '#tipEnd', () => $('#boxEnd').hide());

let sortableInstance = null;
function initSortable() {
  if (sortableInstance) return;
  sortableInstance = new Sortable(document.getElementById('timelineList'), {
    animation: 150,
    handle: '.timeline-header',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    dragClass: 'sortable-drag',
    onEnd: () => { syncYAxis(); }
  });
}

document.addEventListener('contextmenu', e => e.preventDefault());

function getTzByName(cityName) {
  const target = timelines.find(t => t.name === cityName);
  return target ? target.rawTz : "Asia/Shanghai";
}

function getValidTz(cityTz) {
  if (!cityTz) return "Asia/Shanghai";
  const tz = cityTz.trim().toUpperCase();
  const map = {
    "UTC":"UTC","UTC+8":"Asia/Shanghai","CST":"Asia/Shanghai","CHINA":"Asia/Shanghai",
    "JST":"Asia/Tokyo","UTC+9":"Asia/Tokyo","OKINAWA":"Asia/Tokyo",
    "PST":"America/Los_Angeles","UTC-8":"America/Los_Angeles",
    "EST":"America/New_York","UTC-5":"America/New_York",
    "CET":"Europe/Paris","UTC+1":"Europe/Paris",
    "GMT":"Europe/London","BST":"Europe/London"
  };
  for (const k in map) if (tz.includes(k)) return map[k];
  if (moment.tz.zone(cityTz)) return cityTz;
  return "Asia/Shanghai";
}

document.getElementById('searchInput').addEventListener('input', function () {
  const keyword = this.value.trim().toLowerCase();
  const dropdown = document.getElementById('cityDropdown');
  if (!keyword || !cityData) { dropdown.style.display = 'none'; return; }
  let matches = allCityKeys.filter(key => key.toLowerCase().includes(keyword));
  matches.sort((a, b) => {
    const aFirst = a.split('/')[0].toLowerCase();
    const bFirst = b.split('/')[0].toLowerCase();
    const aIsState = a.split('/').length === 2;
    const bIsState = b.split('/').length === 2;
    const aFull = aFirst === keyword; const bFull = bFirst === keyword;
    if (aFull && !bFull) return -1; if (!aFull && bFull) return 1;
    if (aFull && bFull) { if (aIsState && !bIsState) return -1; if (!aIsState && bIsState) return 1; }
    const aStart = aFirst.startsWith(keyword); const bStart = bFirst.startsWith(keyword);
    if (aStart && !bStart) return -1; if (!aStart && bStart) return 1;
    return a.localeCompare(b);
  });
  if (matches.length === 0) {
    dropdown.innerHTML = '<div class="city-item">No city found</div>';
    dropdown.style.display = 'block'; selectedCityKey = ""; selectedTz = ""; return;
  }
  let html = '';
  matches.slice(0,100).forEach(key => { html += `<div class="city-item" data-key="${key}">${key}</div>`; });
  dropdown.innerHTML = html; dropdown.style.display = 'block';
});

document.getElementById('cityDropdown').addEventListener('click', function (e) {
  const item = e.target.closest('.city-item');
  if (!item) return;
  const key = item.dataset.key;
  document.getElementById('searchInput').value = key;
  this.style.display = 'none';
  selectedCityKey = key; selectedTz = cityData[key].tz;
});

function refreshEventCitySelects() {
  const $start = $("#startCitySelect"); const $end = $("#endCitySelect");
  $start.empty(); $end.empty();
  timelines.forEach(t => {
    const opt = `<option value="${t.name}">${t.name}</option>`;
    $start.append(opt); $end.append(opt);
  });
}

function openModal(items, ptime, tz, cityName) {
  editItemId = null; currentItems = items; currentTz = tz; currentCityName = cityName;
  document.getElementById("modalTitle").innerText = "Add Event";
  document.getElementById("eventName").value = "event";
  refreshEventCitySelects();
  $("#startCitySelect").val(currentCityName).trigger("change");
  $("#endCitySelect").val(currentCityName).trigger("change");
  const t = moment.tz(ptime, getValidTz(tz));
  document.getElementById("eventStart").value = t.format("YYYY-MM-DDTHH:mm");
  document.getElementById("eventEnd").value = t.clone().add(1,'h').format("YYYY-MM-DDTHH:mm");
  document.getElementById("eventModal").style.display = "flex";
}

function openEditModal(item, items, tz, cityName) {
  editItemId = item.id; currentItems = items; currentTz = tz; currentCityName = cityName;
  document.getElementById("modalTitle").innerText = "Edit Event";
  document.getElementById("eventName").value = item.content;
  refreshEventCitySelects();
  $("#startCitySelect").val(item.startCityName || currentCityName).trigger("change");
  $("#endCitySelect").val(item.endCityName || currentCityName).trigger("change");
  document.getElementById("eventStart").value = item.startStr;
  document.getElementById("eventEnd").value = item.endStr;
  document.getElementById("eventModal").style.display = "flex";
}

function closeModal() { document.getElementById("eventModal").style.display = "none"; }

function submitEvent() {
  const name = document.getElementById("eventName").value.trim();
  const startCityName = $("#startCitySelect").val();
  const endCityName = $("#endCitySelect").val();
  const sStr = document.getElementById("eventStart").value;
  const eStr = document.getElementById("eventEnd").value;
  const realStartTz = getValidTz(getTzByName(startCityName));
  const realEndTz = getValidTz(getTzByName(endCityName));
  const realStart = moment.tz(sStr, realStartTz).toDate();
  const realEnd = moment.tz(eStr, realEndTz).toDate();
  if (!name || isNaN(realStart) || isNaN(realEnd) || realStart >= realEnd) {
    alert("Invalid input"); return;
  }
  const eventData = {
    id: editItemId || Date.now(), content: name, start: realStart, end: realEnd,
    startCityName: startCityName, endCityName: endCityName,
    startTz: realStartTz, endTz: realEndTz, startStr:sStr, endStr:eStr
  };
  editItemId ? currentItems.update(eventData) : currentItems.add(eventData);
  closeModal();
}

let isDragging=false;
yAxis.addEventListener("mousedown",()=>{isDragging=true});
document.addEventListener("mousemove",e=>{
  if(!isDragging||!timelines.length)return;
  const t=timelines[0].tl.getEventProperties(e).time;
  if(t)userFixedTime=t.getTime(); syncYAxis();
});
document.addEventListener("mouseup",()=>{isDragging=false});

function moveYAxisToTime(time, sourceTl) {
  if (!timelines.length) return;
  const source = timelines.find(i => i.tl === sourceTl);
  const range = source.tl.getWindow();
  const rect = source.tl.dom.centerContainer.getBoundingClientRect();
  let x = (time - range.start) / (range.end - range.start) * rect.width;
  x = Math.max(0, Math.min(rect.width, x));
  yAxis.style.left = x + 13 + "px";
  userFixedTime = time; updateAll();
}

function syncYAxis() {
  if (!timelines.length) return;
  const main = timelines[0].tl;
  const range = main.getWindow();
  const rect = main.dom.centerContainer.getBoundingClientRect();
  let x = (userFixedTime - range.start) / (range.end - range.start) * rect.width;
  x = Math.max(0, Math.min(rect.width, x));
  yAxis.style.left = x + 13 + "px";
  updateAll();
}

function syncAllTimezones(sourceTl) {
  if (isSyncing) return;
  isSyncing = true;
  const r = sourceTl.getWindow();
  timelines.forEach(t => {
    if (t.tl !== sourceTl) {
      t.tl.setWindow(new Date(r.start), new Date(r.end), { animation: false });
    }
  });
  syncYAxis();
  setTimeout(() => { isSyncing = false; }, 50);
}

function add(rawTz, displayName) {
  try {
    const isExist = timelines.some(t => t.name === displayName);
    if (isExist) { alert("This city timeline already exists!"); return; }

    const safeId = rawTz.replace(/[^a-zA-Z0-9]/g, '_') + '_' + Math.random().toString(36).substr(2,5);
    if (addedCities.has(safeId)) return; addedCities.add(safeId);
    const realTz = getValidTz(rawTz);
    const wrap = document.createElement("div");
    wrap.className = "city-timeline"; wrap.dataset.tz = safeId;
    const tlId = "tl_" + safeId; const tipId = "tip_" + safeId;
    wrap.innerHTML = `
      <div class="timeline-header">
        <div>${displayName}</div>
        <button class="del-btn" onclick="remove('${safeId}')">Delete</button>
      </div>
      <div id="${tlId}" class="timeline"></div>
      <div class="city-y-tooltip" id="${tipId}"></div>
    `;
    document.getElementById("timelineList").appendChild(wrap);
    const tl = new vis.Timeline(document.getElementById(tlId));
    tl.setOptions({
      showCurrentTime: false, zoomable: true, moveable: true, orientation: 'top', locale: 'en',
      moment: date => moment.tz(date, realTz)
    });
    const items = new vis.DataSet([]);
    const now = moment.tz(realTz).toDate();
    items.add({ id: 'now-'+safeId, content: '', start: now, type: 'point' });
    tl.setItems(items);
    if (timelines.length > 0) {
      const mainRange = timelines[0].tl.getWindow();
      tl.setWindow(mainRange.start, mainRange.end, {animation:false});
    }
    tl.on('click', p => {
      if (p.what === 'item') moveYAxisToTime(items.get(p.item).start, tl);
      if (p.what === 'background') openModal(items, p.time, rawTz, displayName);
    });
    tl.on('contextmenu', p => p.what==='item' && moveYAxisToTime(items.get(p.item).end, tl));
    tl.on('doubleClick', p => p.what==='item' && openEditModal(items.get(p.item), items, rawTz, displayName));
    timelines.push({ tl, tz: safeId, rawTz: rawTz, tipId, name: displayName });
    tl.on("rangechanged", () => { syncAllTimezones(tl); syncYAxis(); });
    updateAll();
  } catch (err) {
    console.error("Add failed:", err);
    alert("Add city failed: " + err.message);
  }
}

const tzColorMap=new Map();
const colorList=["#409eff","#67c23a","#e6a23c","#f56c6c","#8e44ad","#1abc9c","#34495e","#d35400"];
function getColor(tz){
  const o=moment.tz(getValidTz(tz)).utcOffset();
  if(!tzColorMap.has(o))tzColorMap.set(o,colorList[tzColorMap.size%colorList.length]);
  return tzColorMap.get(o);
}

function remove(safeId){
  const i=timelines.findIndex(t=>t.tz===safeId);
  if(i===-1)return;
  timelines.splice(i,1); addedCities.delete(safeId);
  document.querySelector(`.city-timeline[data-tz="${safeId}"]`).remove();
  syncYAxis();
}

function updateAll(){
  if(!timelines.length){tooltip.innerText="drag";return}
  const x=parseFloat(yAxis.style.left); const t=userFixedTime;
  tooltip.innerText = "drag";
  timelines.forEach(i=>{
    const tip=document.getElementById(i.tipId);
    if(tip){
      tip.style.left=(x+12)+"px";
      tip.style.background=getColor(i.rawTz);
      const cityFirst = i.name.split('/')[0];
      tip.innerText=moment.tz(t, getValidTz(i.rawTz)).format("MM-DD HH:mm")+` [${cityFirst}]`;
    }
  });
}

function getAllCurrentEvents() {
  const events = [];
  timelines.forEach(city => {
    const items = city.tl.itemsData.get();
    items.forEach(item => {
      if (!item.id.toString().startsWith('now-')) {
        events.push({ cityName: city.name, ...item });
      }
    });
  });
  return events;
}

function getAllTimelineCitiesInDisplayOrder() {
  const ordered = [];
  document.querySelectorAll(".city-timeline").forEach(el => {
    const tz = el.dataset.tz;
    const item = timelines.find(t => t.tz === tz);
    if (item) {
      ordered.push({ cityName: item.name, tz: item.rawTz });
    }
  });
  return ordered;
}

function getViewportState() {
  if (!timelines.length) return null;
  const w = timelines[0].tl.getWindow();
  return {
    start: w.start,
    end: w.end,
    userFixedTime: userFixedTime,
    yAxisLeft: yAxis.style.left
  };
}

function ensureDefaultTempRecord() {
  let records = JSON.parse(localStorage.getItem(SAVE_STORAGE_KEY) || "[]");
  const hasTemp = records.some(r => r.name === "temp");
  if (!hasTemp) {
    records.unshift(DEFAULT_TEMP_RECORD);
    localStorage.setItem(SAVE_STORAGE_KEY, JSON.stringify(records));
  }
}

function openSaveModal() {
  const input = document.getElementById("saveNameInput");
  if (currentLoadedRecordName) {
    input.value = currentLoadedRecordName;
  } else {
    input.value = moment().format("YYYY-MM-DD HH:mm:ss");
  }
  document.getElementById("saveNameModal").style.display = "flex";
}

function closeSaveNameModal() {
  document.getElementById("saveNameModal").style.display = "none";
}

function confirmSave() {
  const inputName = document.getElementById("saveNameInput").value.trim();
  if (!inputName) {
    alert("Please input save name!");
    return;
  }

  const cities = getAllTimelineCitiesInDisplayOrder();
  const events = getAllCurrentEvents();
  const viewport = getViewportState();
  let records = JSON.parse(localStorage.getItem(SAVE_STORAGE_KEY) || "[]");
  
  const newRecord = {
    name: inputName,
    cities: cities,
    data: events,
    viewport: viewport
  };

  if (currentLoadedRecordIndex >= 0 && inputName === currentLoadedRecordName) {
    records[currentLoadedRecordIndex] = newRecord;
    alert(`Overwrite saved: ${inputName}`);
  } else {
    records.unshift(newRecord);
    currentLoadedRecordName = inputName;
    currentLoadedRecordIndex = 0;
    alert(`Saved as new record: ${inputName}`);
  }

  localStorage.setItem(SAVE_STORAGE_KEY, JSON.stringify(records));
  closeSaveNameModal();
}

function openLoadModal() {
  ensureDefaultTempRecord();
  const records = JSON.parse(localStorage.getItem(SAVE_STORAGE_KEY) || "[]");
  const list = document.getElementById("saveList");
  
  tempSelectedIndex = -1;
  document.getElementById("btnConfirmLoad").disabled = true;

  if (records.length === 0) {
    list.innerHTML = '<div class="no-saves">No saved records</div>';
  } else {
    let html = "";
    records.forEach((rec, idx) => {
      html += `<div class="save-item" onclick="selectRecord(${idx})">
                 <span class="save-name">${rec.name}</span>
               </div>`;
    });
    list.innerHTML = html;
  }

  document.getElementById("loadModal").style.display = "flex";
}

function closeLoadModal() {
  document.getElementById("loadModal").style.display = "none";
}

function selectRecord(index) {
  tempSelectedIndex = index;
  document.getElementById("btnConfirmLoad").disabled = false;
  document.querySelectorAll(".save-item").forEach((el, i) => {
    el.classList.toggle("selected", i === index);
  });
}

function clearAllCities() {
  timelines.length = 0;
  addedCities.clear();
  document.getElementById("timelineList").innerHTML = "";
  syncYAxis();
}

async function finalLoadRecord() {
  const records = JSON.parse(localStorage.getItem(SAVE_STORAGE_KEY) || "[]");
  const index = tempSelectedIndex;
  if (!records[index] || index < 0) return;

  const record = records[index];
  currentLoadedRecordName = record.name;
  currentLoadedRecordIndex = index;

  clearAllCities();
  if (!cityData) await loadCityJsonData();

  if (record.cities && record.cities.length > 0) {
    for (const c of record.cities) {
      add(c.tz, c.cityName);
      await new Promise(r => setTimeout(r, 50));
    }
  }

  await new Promise(r => setTimeout(r, 200));

  if (record.data) {
    record.data.forEach(event => {
      const city = timelines.find(c => c.name === event.cityName);
      if (city) {
        const fixEvent = { 
          ...event, 
          start: new Date(event.start), 
          end: new Date(event.end) 
        };
        city.tl.itemsData.add(fixEvent);
      }
    });
  }

  if (record.viewport && timelines.length) {
    const vp = record.viewport;
    const mainTl = timelines[0].tl;
    mainTl.setWindow(new Date(vp.start), new Date(vp.end), { animation: false });
    userFixedTime = new Date(vp.userFixedTime).getTime();
    yAxis.style.left = vp.yAxisLeft;
    
    setTimeout(() => {
      syncAllTimezones(mainTl);
      syncYAxis();
      updateAll();
    }, 50);
  }

  refreshEventCitySelects();
  closeLoadModal();
}

async function addDefaultCities() {
  await loadCityJsonData();
  add("Asia/Shanghai", "Shanghai/China");
  await new Promise(r => setTimeout(r, 100));
  add("Asia/Tokyo", "Tokyo/Japan");
  await new Promise(r => setTimeout(r, 100));
  add("America/Los_Angeles", "Los Angeles/United States");
  await new Promise(r => setTimeout(r, 100));
}

$("#addBtn").click(async ()=>{
  if(!selectedTz || !selectedCityKey){
    alert("Please select a city first"); return;
  }
  add(selectedTz, selectedCityKey);
});

(async ()=>{
  await loadCityJsonData();
  initSortable();
  ensureDefaultTempRecord();
  await addDefaultCities(); 
  $("#startCitySelect, #endCitySelect").select2({ placeholder: "Select city" });
})();
</script>
